services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pillmate-ai
    ports:
      - "8001:8001"
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
